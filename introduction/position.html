<!DOCTYPE html>
<html>
    <head>
        <title>Position Learning</title>
    </head>
    <body style="
    padding-top:80px;
    padding-left:80px;">
        <div style="
            background-color:black;
            color:white;
            top:0px;
            left:0px;
            right:0px;
            height:50px;    
            position:fixed;">
            header
        </div>

        <div style="
            background-color:lightgreen;
            color:black;
            position:fixed;
            left:0px;
            bottom:0px;
            top:50px;
            width:70px;">
            sidebar
                <div style="
                    position: absolute;
                    background-color:red;
                    color:white;
                    right:0px;
                    top:0px;
                    ">
             X</div>
        </div>
                <div style="
                    position: fixed;
                    background-color:red;
                    color:white;
                    left:5px;
                    top:80px;
                    ">
             absolute</div>
        </div>

        <div style="
            background-color:lightblue;
            height:200px;
            width:200px;">
            div 1
        </div>
        <div style="
            background-color:lightpink;
            height:200px;
            width:200px;
            position:relative;">
            div 2
             <div style="
                    position: absolute;
                    background-color:black;
                    color:white;
                    bottom:10px;
                    right:10px;
                    ">
             5:00</div>
        </div>
    </body>
</html>
