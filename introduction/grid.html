<!DOCTYPE html>
<html>
    
    <head> 
        <title>Grid learning</title>
        <link rel="stylesheet" href="grid.css">
    </head>
    <body>
        <div style="
            display:grid;
            grid-template-columns: 100px 100px;
            ">
            <div style="background-color:lightblue;">div 1</div>
            <div style="background-color:lightgreen;">div 2 <p>text</p></div>
        </div>

        <div style="
            margin-top:30px;
            display:grid;
            grid-template-columns: 100px 100px 200px;
            ">
            <div style="background-color:lightblue;">100px</div>
            <div style="background-color:lightgreen;">100px</div>
            <div style="background-color:lightpink;">200px</div>
            <div style="background-color:lightblue;">100px</div>
        </div>

        <div style="
            margin-top:30px;
            display:grid;
            grid-template-columns: 100px 1fr;
            ">
            <div style="background-color:lightblue;">100px</div>
            <div style="background-color:lightgreen;">1fr</div>
        </div>

        <div style="
            margin-top:30px;
            display:grid;
            grid-template-columns: 100px 1fr 1fr;
            ">
            <div style="background-color:lightblue;">100px</div>
            <div style="background-color:lightgreen;">1fr</div>
            <div style="background-color:lightpink;">1fr</div>
        </div>

        <div style="
            margin-top:30px;
            display:grid;
            grid-template-columns: 1fr 1fr 1fr;
            row-gap: 30px;
            column-gap:30px;
            ">
            <div style="background-color:lightblue;
            height:100px;">1fr
                
            </div>
            <div style="background-color:lightgreen;">1fr

            </div>
            <div style="background-color:lightpink;">1fr

            </div>
            <div style="background-color:lightblue;
            height:100px;">1fr
                
            </div>
            <div style="background-color:lightgreen;">1fr

            </div>
            <div style="background-color:lightpink;">1fr

            </div>
            <div style="background-color:lightblue;
            height:100px;">1fr
                
            </div>
            <div style="background-color:lightgreen;">1fr

            </div>
            <div style="background-color:lightpink;">1fr

            </div>
            <div style="background-color:lightblue;
            height:100px;">1fr
                
            </div>
            <div style="background-color:lightgreen;">1fr

            </div>
            <div style="background-color:lightpink;">1fr

            </div>
        </div>
    </body>
</html>
