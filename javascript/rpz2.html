<!DOCTYPE html>
<html>
<head>
    <title>rockpaperscissors</title>
    <style>
        .move-button {
            border-radius: 20px;
            height: 50px;
            width: 100px;
            font-size: 15px;
            font-weight: bold;
            font-family:arial;
            background-color: white;
            color: black;
            box-shadow: 5px 5px 5px rgb(188, 216, 85);
            margin-right:20px;
        }
        .move-button:hover {
            background-color: rgb(188, 216, 85);
            transition: 0.5s;
            color: black;
            box-shadow: -5px -5px 5px rgb(188, 216, 85);

        }
        .title {
            font-family: arial;
            color: rgb(188, 216, 85);
            text-align: center;
        }
        .button-container {
            text-align: center;
        }
    </style>
</head>
<body>
    <div>
        <h1 class="title">Rock Paper Scissors</h1>
    </div>
    <div class="button-container">
    <button class="move-button" onclick="

    pickcomputerMove();
    var result = '';

    if (computermove ==='rock') {
        result = 'you tie';
    } else if (computermove === 'paper') {
        result = 'you lose';
    } else {
        result = 'you win';
    }
    alert(`computer chose ${computermove} and ${result}`);
    
    "
    >Rock</button>
    <button class="move-button" onclick="

    var computermove = '';

    var randomnumber = Math.random();
    if (randomnumber >= 0 && randomnumber < 1/3) {
        computermove = 'rock';
    } else if (randomnumber > 1/3 && randomnumber < 2/3) {
        computermove = 'paper';
    } else {
        computermove = 'scissors';
    }
    console.log(computermove);
    var result = '';

    if (computermove ==='paper') {
        result = 'you tie';
    } else if (computermove === 'scissors') {
        result = 'you lose';
    } else {
        result = 'you win';
    }
    alert(`computer chose ${computermove} and ${result}`);
    
    " >Paper</button>
    <button class="move-button" onclick="

    var computermove = '';

    var randomnumber = Math.random();
    if (randomnumber >= 0 && randomnumber < 1/3) {
        computermove = 'rock';
    } else if (randomnumber > 1/3 && randomnumber < 2/3) {
        computermove = 'paper';
    } else {
        computermove = 'scissors';
    }
    console.log(computermove);
    var result = '';

    if (computermove ==='scissors') {
        result = 'you tie';
    } else if (computermove === 'rock') {
        result = 'you lose';
    } else {
        result = 'you win';
    }
    alert(`computer chose ${computermove} and ${result}`);
    
    " >Scissors</button>
    </div>
    <script>
        var computermove = '';
        function pickcomputerMove() {
            var randomnumber = Math.random();
            if (randomnumber >= 0 && randomnumber < 1/3) {
                computermove = 'rock';
            } else if (randomnumber > 1/3 && randomnumber < 2/3) {
                computermove = 'paper';
            } else {
                computermove = 'scissors';
            }
            console.log(computermove);
        }
    </script>
</body>
</html>
