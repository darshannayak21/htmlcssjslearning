<!DOCTYPE html>
<html>
<head>
    <title>rockpaperscissors</title>
    <link rel="stylesheet" href="finalrpz.css">
</head>
<body>
    <div>
        <h1 class="title">Rock Paper Scissors</h1>
    </div>
    <div class="button-container">
    <button class="move-button" onclick="

    playermove('rock'); 

    "
    ><img src="rock.png" class="move-icon"></button>
    <button class="move-button" onclick="

    playermove('paper');

    " ><img src="paper.png" class="move-icon"></button>
    <button class="move-button" onclick="

    playermove('scissors');
    
    " ><img src="scissors.png" class="move-icon"></button>
    <button class="move-button" onclick="resetScore()">
        <img src="reset.png" class="move-icon">
    </button>
    </div>
    <div class="width">
        <div class="scoreboard">
            <div class = "score">wins:
                <span id="win-score">0</span>
            </div>

                <span id="loose-score">0</span>
            </div>
            <div class="score">draws:
                <span id="draw-score">0</span>
            </div>
        </div>
    </div>
    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="result-message"></p>

    <script src="finalrpz.js"></script>
</body>
</html>
