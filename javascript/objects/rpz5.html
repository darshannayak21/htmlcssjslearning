<!DOCTYPE html>
<html>
<head>
    <title>rockpaperscissors</title>
    <style>
        .move-button {
            border-radius: 20px;
            height: 50px;
            width: 100px;
            font-size: 15px;
            font-weight: bold;
            font-family:arial;
            background-color: white;
            color: black;
            box-shadow: 5px 5px 5px rgb(188, 216, 85);
            margin-right:20px;
        }
        .move-button:hover {
            background-color: rgb(188, 216, 85);
            transition: 0.5s;
            color: black;
            box-shadow: -5px -5px 5px rgb(188, 216, 85);

        }
        .title {
            font-family: arial;
            color: rgb(188, 216, 85);
            text-align: center;
        }
        .button-container {
            text-align: center;
        }
        .width {
            width: 400px;
            margin: 20px auto 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .scoreboard {       
            display: flex;
            align-items: center;
            justify-content: center;   
        }
        .score {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 8px;
            font-family: arial;
            color: black;
            height: 25px;
            border: 1px solid black;
            width:140px;    
            border-radius: 20px;
            background-color:  rgb(188, 216, 85);
        }   
    </style>
</head>
<body>
    <div>
        <h1 class="title">Rock Paper Scissors</h1>
    </div>
    <div class="button-container">
    <button class="move-button" onclick="

    playermove('rock'); 

    "
    >Rock</button>
    <button class="move-button" onclick="

    playermove('paper');

    " >Paper</button>
    <button class="move-button" onclick="

    playermove('scissors');
    
    " >Scissors</button>
    <button class="move-button" onclick="resetScore()">
        Reset
    </button>
    </div>
    <div class="width"
        <div class="scoreboard">
            <div class = "score">wins:
                <span id="win-score">0</span>
            </div>
            <div class="score">losses:
                <span id="loose-score">0</span>
            </div>
            <div class="score">draws:
                <span id="draw-score">0</span>
            </div>
        </div>
    </div>

    <script>
        let score = JSON.parse(localStorage.getItem('score')); 
        if (score === null) {
            score = {
                win: 0,
                loose: 0,
                draw: 0
            };
        }

        /*
        let score = JSON.parse(localStorage.getItem('score'))||
                {
                    win: 0,
                    loose: 0,
                    draw: 0
                };
        */
        function countscore(result) {
            if (result === 'you win') {
                score.win += 1;
            } else if (result === 'you lose') {
                score.loose += 1;
            } else {
                score.draw += 1;
            }

        }

        function updateScore() {
        document.getElementById('win-score').textContent = score.win;
        document.getElementById('loose-score').textContent = score.loose;
        document.getElementById('draw-score').textContent = score.draw;
        localStorage.setItem('score', JSON.stringify(score));   
        }

        function resetScore() {
            score.win = 0;
            score.loose = 0;
            score.draw = 0;
            updateScore();
            alert('score reset');
        }

        function playermove(move){
            const computermove = pickcomputerMove();
            var result = '';
            if (move === 'rock') {
                if (computermove ==='rock') {
                    result = 'you tie';
                } else if (computermove === 'paper') {
                    result = 'you lose';
                } else {
                    result = 'you win';
                }
            }
            else if(move === 'paper') {
                if (computermove ==='paper') {
                    result = 'you tie';
                } else if (computermove === 'scissors') {
                    result = 'you lose';
                } else {
                    result = 'you win';
                }
            }
            else {
                if (computermove ==='scissors') {
                    result = 'you tie';
                } else if (computermove === 'rock') {
                    result = 'you lose';
                } else {
                    result = 'you win';
                }
            }
            alert(`computer chose ${computermove} and ${result}`);
            countscore(result);
            updateScore(); 
        }
    
        function pickcomputerMove() {
            var randomnumber = Math.random();
            let computermove = '';
            if (randomnumber >= 0 && randomnumber < 1/3) {
                computermove = 'rock';
            } else if (randomnumber > 1/3 && randomnumber < 2/3) {
                computermove = 'paper';
            } else {
                computermove = 'scissors';
            }
            console.log(computermove);
            return computermove;
        }
        updateScore();
    </script>
</body>
</html>
