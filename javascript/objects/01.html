<!DOCTYPE html>
<html>
<head>
    <title>objects</title>
</head>
<body>
    <script>
        var person = {
            name: 'Alice',
            age: 30,
        };

        console.log(person.name); 
        console.log(person.age); 
        person.name = 'Bob';
        person.age=22;
        person.sex="male";
        console.log(person);
        delete person.sex;
        console.log(person.name);
        console.log(person.age);
    </script>
</body>
</html>
